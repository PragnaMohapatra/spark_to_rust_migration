version: "3.8"

services:
  # ---------- Kafka Infrastructure ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Tuned for 5GB throughput
      KAFKA_MESSAGE_MAX_BYTES: 10485760          # 10MB max message
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824         # 1GB segments
      KAFKA_NUM_PARTITIONS: 8                     # 8 partitions for parallelism
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-setup:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-setup
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topic: financial_transactions'
      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic financial_transactions \
        --partitions 8 \
        --replication-factor 1 \
        --config retention.ms=604800000 \
        --config max.message.bytes=10485760

      echo 'Creating Kafka topic: account_updates'
      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic account_updates \
        --partitions 8 \
        --replication-factor 1 \
        --config retention.ms=604800000 \
        --config max.message.bytes=10485760 \
        --config cleanup.policy=compact

      echo 'Enforcing 7-day retention on all topics (survives restarts)...'
      kafka-configs --bootstrap-server kafka:29092 --entity-type topics --entity-name financial_transactions --alter --add-config retention.ms=604800000,max.message.bytes=10485760
      kafka-configs --bootstrap-server kafka:29092 --entity-type topics --entity-name account_updates --alter --add-config retention.ms=604800000,max.message.bytes=10485760,cleanup.policy=compact

      echo 'Topics created/configured successfully.'
      kafka-topics --describe --bootstrap-server kafka:29092 --topic financial_transactions
      kafka-topics --describe --bootstrap-server kafka:29092 --topic account_updates
      "

  # ---------- Spark ----------
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    restart: unless-stopped
    user: root
    command: /opt/spark/sbin/start-master.sh
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
      - "4041:4041"
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./config:/opt/config
      - ./delta_output:/opt/delta_output
      - ./checkpoints:/opt/checkpoints
      - ./dashboard:/opt/dashboard
      - ./logs:/opt/logs
      - ./jars:/opt/extra-jars

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    restart: unless-stopped
    user: root
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_CORES: 4
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./config:/opt/config
      - ./delta_output:/opt/delta_output
      - ./checkpoints:/opt/checkpoints
      - ./dashboard:/opt/dashboard
      - ./logs:/opt/logs
      - ./jars:/opt/extra-jars

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    restart: unless-stopped
    user: root
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_CORES: 4
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./config:/opt/config
      - ./delta_output:/opt/delta_output
      - ./checkpoints:/opt/checkpoints
      - ./dashboard:/opt/dashboard
      - ./logs:/opt/logs
      - ./jars:/opt/extra-jars

  rust-pipeline:
    build:
      context: ./rust_pipeline
      dockerfile: Dockerfile
    container_name: rust-pipeline
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./config:/opt/config:ro
      - ./delta_output:/opt/delta_output
      - ./checkpoints:/opt/checkpoints
      - ./logs:/opt/logs
    environment:
      - RUST_LOG=info
    command: ["sleep", "infinity"]

  # ---------- Dashboard ----------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard:ro
      - ./config:/app/config:ro
      - ./delta_output:/app/delta_output
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
      - ./data_generator:/app/data_generator:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - DASHBOARD_DOCKER=1
      - SPARK_MASTER_HOST=spark-master
    depends_on:
      - kafka

volumes:
  delta_output:
  checkpoints:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
