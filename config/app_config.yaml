# ──────────────────────────────────────────────────────────────
# Spark-to-Rust Migration — Pipeline Configuration
# ──────────────────────────────────────────────────────────────

kafka:
  bootstrap_servers: "localhost:9092"
  topic: "financial_transactions"
  account_topic: "account_updates"
  partitions: 8
  # For docker-internal Spark access use kafka:29092
  internal_bootstrap_servers: "kafka:29092"

generator:
  # Target data volume per run (bytes). Default: 5 GB
  target_bytes: 5368709120
  # Records per Kafka produce batch
  batch_size: 10000
  # Number of parallel producer threads
  num_threads: 4
  # Estimated bytes per serialized record (~500 bytes avg)
  avg_record_bytes: 500

spark:
  app_name: "FinancialTransactionsPipeline"
  master: "spark://spark-master:7077"
  # Structured streaming trigger interval
  trigger_interval: "10 seconds"
  # Checkpoint location inside container
  checkpoint_location: "/opt/checkpoints/financial_txn"
  # Delta table output path
  delta_output_path: "/opt/delta_output/financial_transactions"
  # Local-mode paths (for running outside Docker)
  local_checkpoint: "./checkpoints/financial_txn"
  local_delta_output: "./delta_output/financial_transactions"
  # Spark tuning
  shuffle_partitions: 8
  max_offsets_per_trigger: 500000
  # Cluster resources (must match docker-compose.yml)
  worker_cores: 4
  worker_memory: "4g"
  worker_count: 2
  max_cores_per_app: 4
  # Cost model reference (USD / core-hour, Azure HDInsight D4v2 on-demand)
  cost_per_core_hour: 0.752

accounts:
  # Number of accounts in the fixed pool
  num_accounts: 2048
  # Checkpoint location for account upsert stream
  checkpoint_location: "/opt/checkpoints/account_upsert"
  local_checkpoint: "./checkpoints/account_upsert"
  # Delta table paths for the accounts table
  delta_output_path: "/opt/delta_output/accounts"
  local_delta_output: "./delta_output/accounts"

delta:
  # Default table path for viewer / cleanup (local mode)
  table_path: "./delta_output/financial_transactions"
  accounts_table_path: "./delta_output/accounts"
  # Vacuum retention (hours) — files older than this are eligible for deletion
  vacuum_retention_hours: 168   # 7 days
  # Compact threshold — number of files before triggering compaction
  compact_threshold: 50

rust:
  consumer_group: "rust-financial-txn-consumer"
  batch_size: 250000
  flush_interval_seconds: 3
  delta_output_path: "/opt/delta_output/financial_transactions_rust"
  local_delta_output: "./delta_output/financial_transactions_rust"
  checkpoint_db: "/opt/checkpoints/rust_financial_txn/offsets.db"
  local_checkpoint_db: "./checkpoints/rust_financial_txn/offsets.db"
  accounts_delta_output_path: "/opt/delta_output/accounts_rust"
  local_accounts_delta_output: "./delta_output/accounts_rust"
  accounts_checkpoint_db: "/opt/checkpoints/rust_account_upsert/offsets.db"
  local_accounts_checkpoint_db: "./checkpoints/rust_account_upsert/offsets.db"
  accounts_consumer_group: "rust-account-upsert-consumer"
  metrics_file: "/opt/logs/rust_metrics.json"
  accounts_metrics_file: "/opt/logs/rust_acct_metrics.json"

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
